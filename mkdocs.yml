site_name: Global Payment Regulations Knowledge Base
docs_dir: .
site_description: The world's most comprehensive, structured, open-source knowledge base for global payment regulations.
site_author: Payment Labs

# Ignore system folders so MkDocs doesn't get confused
exclude_docs: |
  /.github/
  /schemas/
  /scripts/
  /templates/
  /assets/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - search.suggest
    - search.highlight
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - tables
  - toc:
      permalink: true

nav:
  - Home: README.md
  - Countries:
    - Overview: countries/README.md
    - Singapore:
      - Overview: countries/singapore/README.md
      - Payment Services Act: countries/singapore/payment-services-act.md
    - United Kingdom:
      - Overview: countries/united-kingdom/README.md
      - Payment Services Regulations 2017: countries/united-kingdom/payment-services-regulations-2017.md
  - Regulators:
    - Overview: regulators/README.md
  - Topics:
    - Overview: topics/README.md
  - Community:
    - Contributing: CONTRIBUTING.md
    - Changelog: CHANGELOG.md
